services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tripnexus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tripnexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      PORT: 5001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tripnexus
      JWT_SECRET: change-me
      JWT_EXPIRY: 7d
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:5001/api
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy


volumes:
  pgdata:
