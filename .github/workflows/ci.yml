name: CI

on:
  push:
  pull_request:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tripnexus
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d tripnexus"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tripnexus
      JWT_SECRET: change-me
      PORT: 5001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Run backend unit tests
        working-directory: backend
        run: npm test -- --runInBand

      - name: Migrate and seed database
        working-directory: backend
        run: |
          npm run db:migrate
          npm run db:seed

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run backend smoke test
        working-directory: backend
        run: |
          npm run start > /tmp/tripnexus-backend.log 2>&1 &
          sleep 10
          npm run smoke:test
